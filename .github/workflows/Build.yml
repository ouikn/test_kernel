name: Build NDK Native Library

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27d

      - name: Build with ndk-build
        run: |
          cd jni
          ndk-build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-libs
          path: libs/
